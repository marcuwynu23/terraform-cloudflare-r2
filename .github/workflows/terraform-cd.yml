name: CD - Cloudflare R2 (Apply / Destroy)

on:
  workflow_dispatch:
    inputs:
      command:
        description: Terraform operation
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply
      cloudflare_account_id:
        description: Cloudflare Account ID
        required: true
        type: string
      bucket_name:
        description: Name of the R2 bucket (3-64 characters)
        required: true
        type: string
        default: my-r2-bucket

env:
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  provision:
    name: Terraform ${{ github.event.inputs.command }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: |
          terraform plan ${{ github.event.inputs.command == 'destroy' && '-destroy' || '' }} \
            -var="cloudflare_account_id=${{ github.event.inputs.cloudflare_account_id }}" \
            -var="bucket_name=${{ github.event.inputs.bucket_name }}"
      - name: Terraform Apply / Destroy
        run: |
          terraform ${{ github.event.inputs.command }} -auto-approve \
            -var="cloudflare_account_id=${{ github.event.inputs.cloudflare_account_id }}" \
            -var="bucket_name=${{ github.event.inputs.bucket_name }}"
